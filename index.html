<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATL — Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:        #070a0f;
  --bg-card:        #0b0f18;
  --bg-card-hover:  #0f1420;
  --bg-input:       #080c14;
  --bg-elevated:    #111826;
  --border:         #1a2236;
  --border-bright:  #243050;
  --border-accent:  #0e4a8a;
  --accent:         #00d4ff;
  --accent-dim:     #0099bb;
  --accent-glow:    rgba(0,212,255,0.15);
  --bull:           #00e676;
  --bull-dim:       #00a855;
  --bull-glow:      rgba(0,230,118,0.12);
  --bear:           #ff3d57;
  --bear-dim:       #cc2040;
  --bear-glow:      rgba(255,61,87,0.12);
  --orange:         #ff9800;
  --orange-dim:     rgba(255,152,0,0.12);
  --gold:           #ffd54f;
  --text-primary:   #d0dff0;
  --text-secondary: #6a85a8;
  --text-dim:       #3a4f6a;
  --font-display:   'Orbitron', monospace;
  --font-body:      'Chakra Petch', sans-serif;
  --font-mono:      'Share Tech Mono', monospace;
  --radius:         4px;
  --radius-lg:      6px;
  --shadow-card:    0 4px 24px rgba(0,0,0,0.5);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg-base); color:var(--text-primary);
  font-family:var(--font-body); font-size:13px;
  min-height:100vh; overflow-x:hidden;
}
.bg-grid {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size:40px 40px;
}
.bg-glow {
  position:fixed; top:-200px; left:50%; transform:translateX(-50%);
  width:800px; height:400px; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse, rgba(0,212,255,0.05) 0%, transparent 70%);
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-base); }
::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--accent-dim); }

/* HEADER */
.header {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:56px;
  background:rgba(7,10,15,0.96); border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.header-left { display:flex; align-items:center; gap:20px; }
.logo { font-family:var(--font-display); font-size:1.1rem; font-weight:900; letter-spacing:4px; color:var(--accent); text-shadow:0 0 20px var(--accent); }
.logo-bracket { color:var(--text-dim); text-shadow:none; }
.header-sub { font-family:var(--font-mono); font-size:0.65rem; color:var(--text-dim); letter-spacing:3px; border-left:1px solid var(--border); padding-left:20px; }
.header-right { display:flex; align-items:center; gap:20px; }

/* TAB NAV */
.tab-nav {
  position:sticky; top:56px; z-index:99;
  display:flex; align-items:center; gap:0;
  background:rgba(7,10,15,0.96); border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px); padding:0 24px;
}
.tab-btn {
  display:flex; align-items:center; gap:8px;
  font-family:var(--font-display); font-size:0.6rem; font-weight:700;
  letter-spacing:2.5px; padding:14px 20px; cursor:pointer;
  color:var(--text-dim); border:none; background:none;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all 0.2s ease; position:relative;
}
.tab-btn:hover { color:var(--text-primary); }
.tab-btn.active-funding {
  color:var(--accent); border-bottom-color:var(--accent);
}
.tab-btn.active-pulse {
  color:var(--bull); border-bottom-color:var(--bull);
}
.tab-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; opacity:0.4; }
.tab-btn.active-funding .tab-dot { background:var(--accent); opacity:1; box-shadow:0 0 6px var(--accent); }
.tab-btn.active-pulse   .tab-dot { background:var(--bull);   opacity:1; box-shadow:0 0 6px var(--bull); }
.tab-pane { display:none; }
.tab-pane.active { display:block; }
.status-indicator { display:flex; align-items:center; gap:8px; }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--text-dim); }
.status-dot.ready   { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse-dot 3s ease-in-out infinite; }
.status-dot.loading { background:var(--orange); box-shadow:0 0 8px var(--orange); animation:pulse-dot 0.5s ease-in-out infinite; }
.status-dot.ok      { background:var(--bull); box-shadow:0 0 8px var(--bull); animation:pulse-dot 2s ease-in-out infinite; }
.status-dot.error   { background:var(--bear); box-shadow:0 0 8px var(--bear); animation:none; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-text { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-secondary); letter-spacing:2px; }
.header-time { font-family:var(--font-mono); font-size:0.85rem; color:var(--accent); letter-spacing:2px; min-width:80px; text-align:right; }

/* MAIN */
.main-content { position:relative; z-index:1; padding:20px 24px; max-width:1600px; margin:0 auto; }

/* EXCHANGE SELECTOR PANEL */
.exchange-panel {
  display:flex; align-items:center; gap:16px;
  background:var(--bg-card); border:1px solid var(--border-bright);
  border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:16px;
}
.panel-label {
  font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim);
  letter-spacing:2px; white-space:nowrap; flex-shrink:0;
}
.ex-selector { display:flex; gap:8px; }
.ex-select-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:var(--bg-input); border:1px solid var(--border-bright);
  border-radius:var(--radius); padding:12px 28px; cursor:pointer;
  transition:all 0.2s ease; font-family:var(--font-display);
  font-size:0.62rem; font-weight:700; letter-spacing:2px;
  color:var(--text-dim); position:relative; overflow:hidden;
}
.ex-select-btn::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  transition:opacity 0.2s; opacity:0;
}
.ex-select-btn.binance-btn::after { background:var(--orange); }
.ex-select-btn.bybit-btn::after   { background:var(--accent); }
.ex-select-btn:hover { color:var(--text-primary); }
.ex-select-btn.binance-btn:hover { border-color:rgba(255,152,0,0.4); color:var(--orange); }
.ex-select-btn.bybit-btn:hover   { border-color:rgba(0,212,255,0.4); color:var(--accent); }
.ex-select-btn.selected.binance-btn {
  background:rgba(255,152,0,0.08); border-color:rgba(255,152,0,0.5);
  color:var(--orange); box-shadow:0 0 16px rgba(255,152,0,0.08);
}
.ex-select-btn.selected.binance-btn::after { opacity:1; }
.ex-select-btn.selected.bybit-btn {
  background:var(--accent-glow); border-color:rgba(0,212,255,0.5);
  color:var(--accent); box-shadow:0 0 16px rgba(0,212,255,0.08);
}
.ex-select-btn.selected.bybit-btn::after { opacity:1; }
.ex-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.binance-btn .ex-dot { background:var(--orange); }
.bybit-btn   .ex-dot { background:var(--accent); }
.ex-select-btn:not(.selected) .ex-dot { opacity:0.25; }

.panel-sep { width:1px; height:36px; background:var(--border); flex-shrink:0; margin:0 4px; }

/* SCAN BUTTON */
.scan-btn {
  display:flex; align-items:center; gap:10px;
  background:transparent; border:1px solid var(--border-bright); color:var(--text-dim);
  font-family:var(--font-display); font-size:0.68rem; font-weight:700; letter-spacing:3px;
  padding:11px 28px; border-radius:var(--radius); cursor:not-allowed;
  transition:all 0.2s ease; position:relative; overflow:hidden;
  opacity:0.35;
}
.scan-btn::before {
  content:''; position:absolute; inset:0;
  transform:translateX(-100%); transition:transform 0.2s ease; z-index:0;
}
.scan-btn.enabled {
  opacity:1; cursor:pointer;
}
.scan-btn.enabled.bybit-scan { border-color:var(--accent); color:var(--accent); }
.scan-btn.enabled.bybit-scan::before { background:var(--accent); }
.scan-btn.enabled.bybit-scan:hover { color:var(--bg-base); box-shadow:0 0 20px rgba(0,212,255,0.2); }
.scan-btn.enabled.bybit-scan:hover::before { transform:translateX(0); }

.scan-btn.enabled.binance-scan { border-color:var(--orange); color:var(--orange); }
.scan-btn.enabled.binance-scan::before { background:var(--orange); }
.scan-btn.enabled.binance-scan:hover { color:var(--bg-base); box-shadow:0 0 20px rgba(255,152,0,0.2); }
.scan-btn.enabled.binance-scan:hover::before { transform:translateX(0); }

.scan-btn.loading { opacity:0.6; pointer-events:none; }
.scan-btn > * { position:relative; z-index:1; }
.scan-icon { font-size:1rem; }
.scan-btn.loading .scan-icon { animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ACTIVE EXCHANGE INFO STRIP */
.active-ex-strip {
  display:none; align-items:center; gap:10px; flex-wrap:wrap;
  padding:8px 14px; border-radius:var(--radius); margin-bottom:16px; border:1px solid;
}
.active-ex-strip.binance { background:rgba(255,152,0,0.04); border-color:rgba(255,152,0,0.18); }
.active-ex-strip.bybit   { background:rgba(0,212,255,0.04); border-color:rgba(0,212,255,0.18); }
.strip-ex-label { font-family:var(--font-display); font-size:0.6rem; font-weight:700; letter-spacing:2px; }
.strip-ex-label.binance { color:var(--orange); }
.strip-ex-label.bybit   { color:var(--accent); }
.strip-sep  { color:var(--border-bright); }
.strip-info { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:1px; }
.strip-val  { font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.5px; }
.strip-val.ok   { color:var(--bull); }
.strip-val.fail { color:var(--bear); }

/* CONTROLS BAR */
.controls-bar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.controls-group {
  display:flex; align-items:center; gap:0;
  background:var(--bg-input); border:1px solid var(--border-bright);
  border-radius:var(--radius); overflow:hidden; transition:border-color 0.2s; height:38px;
}
.controls-group:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
.cg-label { font-family:var(--font-mono); font-size:0.62rem; color:var(--accent-dim); letter-spacing:1px; border-right:1px solid var(--border); padding:0 10px; white-space:nowrap; }
.threshold-input { background:none; border:none; outline:none; color:var(--gold); font-family:var(--font-mono); font-size:0.85rem; letter-spacing:2px; width:60px; text-align:center; padding:0 6px; }
.cg-suffix { font-family:var(--font-mono); font-size:0.62rem; color:var(--text-dim); padding:0 10px; border-left:1px solid var(--border); }
.filter-group { display:flex; gap:4px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:4px; }
.filter-btn { background:none; border:none; color:var(--text-dim); font-family:var(--font-body); font-size:0.7rem; font-weight:600; letter-spacing:1.5px; padding:6px 14px; border-radius:2px; cursor:pointer; transition:all 0.15s ease; }
.filter-btn:hover { color:var(--text-primary); background:var(--bg-elevated); }
.filter-btn.active-all { background:var(--accent); color:var(--bg-base); }
.filter-btn.active-pos { background:var(--bull-glow); color:var(--bull); border:1px solid rgba(0,230,118,0.3); }
.filter-btn.active-neg { background:var(--bear-glow); color:var(--bear); border:1px solid rgba(255,61,87,0.3); }
.search-wrapper { display:flex; align-items:center; background:var(--bg-input); border:1px solid var(--border-bright); border-radius:var(--radius); overflow:hidden; transition:border-color 0.2s; }
.search-wrapper:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
.search-prefix { font-family:var(--font-mono); font-size:0.62rem; color:var(--accent-dim); padding:0 10px; letter-spacing:1px; border-right:1px solid var(--border); white-space:nowrap; }
.search-input { background:none; border:none; outline:none; color:var(--text-primary); font-family:var(--font-mono); font-size:0.82rem; letter-spacing:2px; padding:9px 12px; width:130px; text-transform:uppercase; }
.search-input::placeholder { color:var(--text-dim); letter-spacing:1px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; box-shadow:var(--shadow-card); position:relative; overflow:hidden; transition:border-color 0.2s; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent-dim),transparent); opacity:0; transition:opacity 0.3s; }
.stat-card:hover::before { opacity:0.5; }
.stat-card:hover { border-color:var(--border-bright); }
.stat-card::after { content:''; position:absolute; top:0; left:0; width:2px; bottom:0; }
.stat-card.total-card::after { background:var(--accent); }
.stat-card.pos-card::after   { background:var(--bull); }
.stat-card.neg-card::after   { background:var(--bear); }
.stat-card.info-card::after  { background:var(--orange); }
.stat-label { font-family:var(--font-mono); font-size:0.55rem; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.stat-val { font-family:var(--font-display); font-size:1.6rem; font-weight:700; letter-spacing:1px; line-height:1; }
.stat-val.accent { color:var(--accent); }
.stat-val.bull   { color:var(--bull); }
.stat-val.bear   { color:var(--bear); }
.stat-val.gold   { font-size:0.88rem; font-weight:400; font-family:var(--font-mono); color:var(--gold); }

/* RESULT META */
.result-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.result-count { font-family:var(--font-mono); font-size:0.62rem; color:var(--text-dim); letter-spacing:1px; }
.updated-text { font-family:var(--font-mono); font-size:0.62rem; color:var(--text-dim); letter-spacing:1px; }

/* TABLE */
.table-wrapper { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-card); }
.scanner-table { width:100%; border-collapse:collapse; font-family:var(--font-mono); font-size:0.75rem; }
.scanner-table thead tr { background:var(--bg-elevated); border-bottom:1px solid var(--border-bright); }
.scanner-table th { padding:10px 16px; text-align:left; font-size:0.6rem; letter-spacing:2px; color:var(--text-dim); font-weight:600; white-space:nowrap; cursor:pointer; user-select:none; transition:color 0.15s; }
.scanner-table th:hover { color:var(--accent); }
.scanner-table th.sorted { color:var(--accent); }
.sort-icon { margin-left:3px; opacity:0.5; font-size:0.6rem; }
.sort-icon.active { opacity:1; }
.scanner-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s ease; }
.scanner-table tbody tr:hover { background:var(--bg-card-hover); }
.scanner-table tbody tr:last-child { border-bottom:none; }
.scanner-table td { padding:9px 16px; white-space:nowrap; color:var(--text-primary); letter-spacing:0.5px; }

/* COIN CELL */
.coin-cell { display:flex; align-items:center; gap:10px; }
.coin-icon { width:30px; height:30px; border-radius:50%; background:var(--bg-elevated); border:1px solid var(--border-bright); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:7px; font-weight:700; color:var(--text-dim); flex-shrink:0; }
.coin-sym  { font-weight:700; font-size:0.75rem; color:var(--accent); letter-spacing:1.5px; }
.coin-full { font-size:0.6rem; color:var(--text-dim); letter-spacing:0.5px; margin-top:1px; }

/* BADGES */
.ex-badge { font-family:var(--font-display); font-size:0.52rem; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:2px; }
.ex-binance { background:rgba(255,152,0,0.1); color:var(--orange); border:1px solid rgba(255,152,0,0.2); }
.ex-bybit   { background:var(--accent-glow); color:var(--accent); border:1px solid rgba(0,212,255,0.2); }
.type-badge { font-family:var(--font-mono); font-size:0.56rem; padding:2px 7px; border-radius:2px; }
.type-futures { background:rgba(238,237,254,0.05); color:#AFA9EC; border:1px solid rgba(175,169,236,0.15); }

/* RATE CELL */
.rate-cell { display:flex; align-items:center; gap:10px; }
.rate-val { font-family:var(--font-display); font-size:0.72rem; font-weight:700; letter-spacing:1px; min-width:92px; }
.rate-val.pos   { color:var(--bull); text-shadow:0 0 10px rgba(0,230,118,0.3); }
.rate-val.neg   { color:var(--bear); text-shadow:0 0 10px rgba(255,61,87,0.3); }
.rate-val.muted { color:var(--text-secondary); text-shadow:none; }
.rate-bar-bg { width:80px; height:4px; background:var(--bg-elevated); border-radius:2px; overflow:hidden; border:1px solid var(--border); }
.rate-bar { height:100%; border-radius:2px; transition:width 0.5s ease; }
.bar-pos { background:var(--bull); box-shadow:0 0 6px rgba(0,230,118,0.5); }
.bar-neg { background:var(--bear); box-shadow:0 0 6px rgba(255,61,87,0.5); }

/* SIGNAL */
.signal-badge { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:1px; padding:2px 8px; border-radius:2px; }
.sig-extreme { background:rgba(255,61,87,0.15); color:var(--bear); border:1px solid rgba(255,61,87,0.3); }
.sig-pos     { background:rgba(0,230,118,0.1);  color:var(--bull); border:1px solid rgba(0,230,118,0.2); }
.sig-neg     { background:rgba(255,213,79,0.1);  color:var(--gold); border:1px solid rgba(255,213,79,0.2); }
.price-val { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-secondary); }

/* IDLE STATE */
.idle-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:14px; }
.idle-icon  { font-size:2.2rem; opacity:0.12; line-height:1; }
.idle-title { font-family:var(--font-display); font-size:0.75rem; letter-spacing:4px; color:var(--text-dim); }
.idle-sub   { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:1px; opacity:0.5; }

/* STATE ROWS */
.state-row td { text-align:center; padding:80px 20px; font-family:var(--font-mono); font-size:0.75rem; color:var(--text-dim); letter-spacing:2px; }
.loader-ring { display:inline-block; width:18px; height:18px; border:2px solid var(--border-bright); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:10px; }
.loader-ring.orange { border-top-color:var(--orange); }

/* FOOTER */
.footer { display:flex; justify-content:space-between; align-items:center; padding:14px 24px; border-top:1px solid var(--border); margin-top:32px; font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:1px; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
tbody tr { animation:fadeIn 0.2s ease both; }

/* ── MOBILE CARD LAYOUT ── */
@media (max-width:768px) {
  .main-content { padding:10px 12px; }
  .header { padding:0 12px; height:50px; }
  .header-sub { display:none; }
  .header-time { font-size:0.75rem; min-width:60px; }
  .logo { font-size:0.9rem; letter-spacing:3px; }

  /* Exchange panel */
  .exchange-panel { flex-wrap:wrap; gap:10px; padding:12px 14px; }
  .ex-selector { flex:1; }
  .ex-select-btn { flex:1; padding:10px 8px; font-size:0.55rem; letter-spacing:1px; }
  .scan-btn { width:100%; justify-content:center; padding:10px; font-size:0.6rem; }

  /* Active strip */
  .active-ex-strip { gap:6px; font-size:0.58rem; }
  .strip-info { display:none; }

  /* Controls bar */
  .controls-bar { gap:8px; }
  .controls-group { flex:1; }
  .threshold-input { width:48px; }
  .filter-group { flex:1; justify-content:space-between; }
  .filter-btn { padding:6px 8px; font-size:0.65rem; flex:1; text-align:center; }
  .search-wrapper { width:100%; }
  .search-input { width:100%; }

  /* Stats */
  .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
  .stat-val { font-size:1.3rem; }
  .stat-val.gold { font-size:0.78rem; }

  /* Hide desktop table, show mobile cards */
  .table-wrapper { background:transparent; border:none; box-shadow:none; border-radius:0; overflow:visible; }
  .scanner-table { display:none; }
  .mobile-cards { display:flex; flex-direction:column; gap:8px; }

  /* Footer */
  .footer { flex-direction:column; gap:6px; text-align:center; padding:12px; }
}

/* Mobile card styles (always defined, only shown on mobile) */
.mobile-cards { display:none; }

.m-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  animation:fadeIn 0.2s ease both;
  position:relative;
  overflow:hidden;
}
.m-card::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:3px;
}
.m-card.m-pos::before { background:var(--bull); }
.m-card.m-neg::before { background:var(--bear); }

.m-card-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.m-coin-left {
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  min-width:0;
}
.m-coin-icon {
  width:36px; height:36px;
  border-radius:50%;
  background:var(--bg-elevated);
  border:1px solid var(--border-bright);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:7px;
  font-weight:700; color:var(--text-dim);
  flex-shrink:0;
}
.m-coin-sym {
  font-family:var(--font-display);
  font-size:0.85rem; font-weight:700;
  color:var(--accent); letter-spacing:1.5px;
}
.m-coin-full {
  font-family:var(--font-mono);
  font-size:0.58rem; color:var(--text-dim);
  letter-spacing:0.5px; margin-top:1px;
}
.m-rate-right {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
  flex-shrink:0;
}
.m-rate-val {
  font-family:var(--font-display);
  font-size:1.05rem; font-weight:700;
  letter-spacing:1px;
}
.m-rate-val.pos { color:var(--bull); text-shadow:0 0 10px rgba(0,230,118,0.3); }
.m-rate-val.neg { color:var(--bear); text-shadow:0 0 10px rgba(255,61,87,0.3); }
.m-abs-val {
  font-family:var(--font-mono);
  font-size:0.6rem; color:var(--text-secondary);
}

.m-card-bottom {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.m-bar-wrap {
  flex:1;
  height:4px;
  background:var(--bg-elevated);
  border-radius:2px;
  overflow:hidden;
  border:1px solid var(--border);
}
.m-bar {
  height:100%;
  border-radius:2px;
  transition:width 0.5s ease;
}
.m-bar.bar-pos { background:var(--bull); box-shadow:0 0 6px rgba(0,230,118,0.5); }
.m-bar.bar-neg { background:var(--bear); box-shadow:0 0 6px rgba(255,61,87,0.5); }

.m-meta {
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
.m-price {
  font-family:var(--font-mono);
  font-size:0.65rem; color:var(--text-secondary);
}
.m-signal { font-family:var(--font-mono); font-size:0.52rem; letter-spacing:1px; padding:2px 7px; border-radius:2px; }

.m-empty {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 20px; gap:12px;
}
.m-empty-icon { font-size:2rem; opacity:0.12; }
.m-empty-title { font-family:var(--font-display); font-size:0.7rem; letter-spacing:3px; color:var(--text-dim); }
.m-empty-sub   { font-family:var(--font-mono); font-size:0.58rem; color:var(--text-dim); opacity:0.5; }

/* ── PULSE TAB STYLES ── */

/* Exchange selector for pulse */
.pulse-ex-panel {
  display:flex; align-items:center; gap:16px;
  background:var(--bg-card); border:1px solid var(--border-bright);
  border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:16px;
}

/* Pulse progress */
.pulse-progress {
  height:2px; background:var(--border); border-radius:1px;
  margin-bottom:16px; overflow:hidden; display:none;
}
.pulse-progress-fill {
  height:100%; background:var(--bull); border-radius:1px;
  transition:width 0.4s ease; width:0;
}

/* Pulse summary cards */
.pulse-summary {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px; margin-bottom:16px; display:none;
}
.pulse-sum-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:14px 16px;
  position:relative; overflow:hidden;
}
.pulse-sum-card::after { content:''; position:absolute; top:0; left:0; width:2px; bottom:0; }
.pulse-sum-card.c-all::after   { background:var(--accent); }
.pulse-sum-card.c-bull::after  { background:var(--bull); }
.pulse-sum-card.c-bear::after  { background:var(--bear); }
.pulse-sum-card.c-warn::after  { background:var(--orange); }
.pulse-sum-card.c-neut::after  { background:var(--text-dim); }

/* Pulse filter bar */
.pulse-filter-bar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:16px; flex-wrap:wrap; display:none;
}
.pulse-search-wrap {
  display:flex; align-items:center; background:var(--bg-input);
  border:1px solid var(--border-bright); border-radius:var(--radius);
  overflow:hidden; transition:border-color 0.2s; margin-left:auto;
}
.pulse-search-wrap:focus-within { border-color:var(--bull); box-shadow:0 0 0 2px rgba(0,230,118,0.1); }
.pulse-search-prefix { font-family:var(--font-mono); font-size:0.62rem; color:var(--bull-dim); padding:0 10px; letter-spacing:1px; border-right:1px solid var(--border); white-space:nowrap; }
.pulse-search-input { background:none; border:none; outline:none; color:var(--text-primary); font-family:var(--font-mono); font-size:0.82rem; letter-spacing:2px; padding:9px 12px; width:130px; text-transform:uppercase; }

/* Outcome filter buttons */
.outcome-filter-group { display:flex; gap:4px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:4px; }
.outcome-btn { background:none; border:none; color:var(--text-dim); font-family:var(--font-body); font-size:0.65rem; font-weight:600; letter-spacing:1px; padding:5px 12px; border-radius:2px; cursor:pointer; transition:all 0.15s ease; white-space:nowrap; }
.outcome-btn:hover { color:var(--text-primary); background:var(--bg-elevated); }
.outcome-btn.of-all  { background:var(--accent); color:var(--bg-base); }
.outcome-btn.of-bull { background:var(--bull-glow); color:var(--bull); border:1px solid rgba(0,230,118,0.3); }
.outcome-btn.of-bear { background:var(--bear-glow); color:var(--bear); border:1px solid rgba(255,61,87,0.3); }
.outcome-btn.of-warn { background:var(--orange-dim); color:var(--orange); border:1px solid rgba(255,152,0,0.3); }

/* Pulse result meta */
.pulse-result-meta {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px; flex-wrap:wrap; gap:8px; display:none;
}

/* PULSE CARDS GRID */
.pulse-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
  gap:12px;
}

/* Individual pulse card */
.pulse-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
  animation:fadeIn 0.25s ease both;
  transition:border-color 0.2s, box-shadow 0.2s;
  cursor:default;
}
.pulse-card:hover { border-color:var(--border-bright); }
.pulse-card.outcome-bull { border-left:3px solid var(--bull); }
.pulse-card.outcome-bear { border-left:3px solid var(--bear); }
.pulse-card.outcome-warn { border-left:3px solid var(--orange); }
.pulse-card.outcome-neut { border-left:3px solid var(--text-dim); }

/* Card header */
.pc-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px 10px; border-bottom:1px solid var(--border);
}
.pc-coin-wrap { display:flex; align-items:center; gap:10px; }
.pc-icon {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg-elevated); border:1px solid var(--border-bright);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:6px; font-weight:700;
  color:var(--text-dim); flex-shrink:0;
}
.pc-sym { font-family:var(--font-display); font-size:0.8rem; font-weight:700; color:var(--accent); letter-spacing:1.5px; }
.pc-full { font-family:var(--font-mono); font-size:0.55rem; color:var(--text-dim); margin-top:1px; }
.pc-outcome {
  font-family:var(--font-mono); font-size:0.55rem; letter-spacing:1px;
  padding:3px 10px; border-radius:2px; flex-shrink:0; text-align:right;
}
.oc-bull { background:rgba(0,230,118,0.1); color:var(--bull); border:1px solid rgba(0,230,118,0.25); }
.oc-bear { background:rgba(255,61,87,0.1); color:var(--bear); border:1px solid rgba(255,61,87,0.25); }
.oc-warn { background:rgba(255,152,0,0.1); color:var(--orange); border:1px solid rgba(255,152,0,0.25); }
.oc-neut { background:rgba(106,133,168,0.1); color:var(--text-secondary); border:1px solid rgba(106,133,168,0.2); }

/* Metrics grid inside card */
.pc-metrics {
  display:grid; grid-template-columns:1fr 1fr;
  gap:0; padding:0;
}
.pc-metric {
  padding:9px 14px; border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.pc-metric:nth-child(even) { border-right:none; }
.pc-metric:nth-last-child(-n+2) { border-bottom:none; }
.pc-metric-label { font-family:var(--font-mono); font-size:0.5rem; color:var(--text-dim); letter-spacing:1.5px; margin-bottom:4px; }
.pc-metric-val { font-family:var(--font-display); font-size:0.72rem; font-weight:700; letter-spacing:0.5px; }
.pc-metric-val.pos { color:var(--bull); }
.pc-metric-val.neg { color:var(--bear); }
.pc-metric-val.neu { color:var(--text-secondary); }
.pc-metric-val.warn { color:var(--orange); }
.pc-metric-val.gold { color:var(--gold); }
.pc-metric-sub { font-family:var(--font-mono); font-size:0.5rem; color:var(--text-dim); margin-top:2px; }

/* Score bar */
.pc-score-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; border-top:1px solid var(--border);
}
.pc-score-label { font-family:var(--font-mono); font-size:0.52rem; color:var(--text-dim); letter-spacing:1px; white-space:nowrap; }
.pc-score-bar-bg { flex:1; height:6px; background:var(--bg-elevated); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
.pc-score-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
.fill-bull { background:linear-gradient(90deg, var(--bull-dim), var(--bull)); box-shadow:0 0 8px rgba(0,230,118,0.4); }
.fill-bear { background:linear-gradient(90deg, var(--bear-dim), var(--bear)); box-shadow:0 0 8px rgba(255,61,87,0.4); }
.fill-warn { background:linear-gradient(90deg, #cc7000, var(--orange)); box-shadow:0 0 8px rgba(255,152,0,0.4); }
.fill-neut { background:var(--text-dim); }
.pc-score-num { font-family:var(--font-display); font-size:0.7rem; font-weight:700; min-width:36px; text-align:right; }

/* Thesis row */
.pc-thesis {
  padding:8px 14px; background:rgba(0,0,0,0.2);
  border-top:1px solid var(--border);
  font-family:var(--font-mono); font-size:0.58rem;
  color:var(--text-secondary); line-height:1.5; letter-spacing:0.3px;
}
.pc-thesis strong { color:var(--text-primary); }

/* Pulse idle / loading */
.pulse-idle {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:80px 20px; gap:14px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg);
}
.pulse-idle-icon { font-size:2.2rem; opacity:0.1; }
.pulse-idle-title { font-family:var(--font-display); font-size:0.75rem; letter-spacing:4px; color:var(--text-dim); }
.pulse-idle-sub   { font-family:var(--font-mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:1px; opacity:0.5; }

/* Note: Bybit only for PULSE — it has bulk OI+volume+funding in one call */
.pulse-note {
  font-family:var(--font-mono); font-size:0.58rem; color:var(--text-dim);
  padding:8px 14px; background:rgba(0,212,255,0.03);
  border:1px solid rgba(0,212,255,0.08); border-radius:var(--radius);
  margin-bottom:16px; letter-spacing:0.5px; line-height:1.6;
}
.pulse-note span { color:var(--accent); }

@media (max-width:768px) {
  .tab-nav { padding:0 12px; top:50px; }
  .tab-btn { padding:12px 14px; font-size:0.55rem; letter-spacing:1.5px; }
  .pulse-grid { grid-template-columns:1fr; }
  .pulse-ex-panel { flex-wrap:wrap; gap:10px; padding:12px 14px; }
  .pulse-search-input { width:100%; }
  .pulse-search-wrap { width:100%; margin-left:0; }
  .pulse-filter-bar { flex-direction:column; align-items:stretch; }
  .outcome-filter-group { justify-content:space-between; }
  .outcome-btn { flex:1; text-align:center; }
}

</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<header class="header">
  <div class="header-left">
    <div class="logo"><span class="logo-bracket">[</span>ATL<span class="logo-bracket">]</span></div>
    <div class="header-sub">MARKET INTELLIGENCE</div>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">SELECT EXCHANGE</span>
    </div>
    <div class="header-time" id="header-time">--:--:--</div>
  </div>
</header>

<!-- TAB NAVIGATION -->
<nav class="tab-nav">
  <button class="tab-btn active-funding" id="tab-funding" onclick="switchTab('funding')">
    <span class="tab-dot" style="background:var(--accent)"></span>
    FUNDING
  </button>
  <button class="tab-btn" id="tab-pulse" onclick="switchTab('pulse')">
    <span class="tab-dot" style="background:var(--bull)"></span>
    PULSE
  </button>
</nav>

<main class="main-content">

<!-- ══════════════ FUNDING TAB ══════════════ -->
<div class="tab-pane active" id="pane-funding">

  <!-- STEP 1: EXCHANGE SELECTOR + SCAN BUTTON -->
  <div class="exchange-panel">
    <span class="panel-label">EXCHANGE:</span>
    <div class="ex-selector">
      <button class="ex-select-btn binance-btn" id="ex-binance" onclick="selectExchange('binance')">
        <span class="ex-dot"></span>
        BINANCE FUTURES
      </button>
      <button class="ex-select-btn bybit-btn" id="ex-bybit" onclick="selectExchange('bybit')">
        <span class="ex-dot"></span>
        BYBIT LINEAR
      </button>
    </div>
    <div class="panel-sep"></div>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">
      <span class="scan-icon" id="scan-icon">⟳</span>
      <span id="scan-label">SCAN</span>
    </button>
  </div>

  <!-- ACTIVE EXCHANGE INFO STRIP (shown after scan) -->
  <div class="active-ex-strip" id="active-strip">
    <span class="strip-ex-label" id="strip-ex-name">—</span>
    <span class="strip-sep">·</span>
    <span class="strip-info">SYMBOLS FETCHED:</span>
    <span class="strip-val" id="strip-count">—</span>
    <span class="strip-sep">·</span>
    <span class="strip-info">THRESHOLD:</span>
    <span class="strip-val ok" id="strip-thr">—</span>
    <span class="strip-sep">·</span>
    <span class="strip-info">UPDATED:</span>
    <span class="strip-val ok" id="strip-upd">—</span>
  </div>

  <!-- CONTROLS (hidden until first scan) -->
  <div class="controls-bar" id="controls-bar" style="display:none;">
    <div class="controls-group">
      <span class="cg-label">POS THRESHOLD</span>
      <input type="number" class="threshold-input" id="threshold" value="0.03" step="0.01" min="0.001" max="5"/>
      <span class="cg-suffix">%</span>
    </div>
    <div class="filter-group">
      <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn"            id="f-pos" onclick="setFilter('pos')">POSITIVE</button>
      <button class="filter-btn"            id="f-neg" onclick="setFilter('neg')">NEGATIVE</button>
    </div>
    <div class="search-wrapper">
      <span class="search-prefix">SEARCH://</span>
      <input type="text" class="search-input" id="search-input" placeholder="BTC..." oninput="renderTable()"/>
    </div>
  </div>

  <!-- STATS (hidden until first scan) -->
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-card total-card">
      <div class="stat-label">TOTAL SIGNALS</div>
      <div class="stat-val accent" id="s-total">—</div>
    </div>
    <div class="stat-card pos-card">
      <div class="stat-label">POSITIVE FUNDING</div>
      <div class="stat-val bull" id="s-pos">—</div>
    </div>
    <div class="stat-card neg-card">
      <div class="stat-label">NEGATIVE FUNDING</div>
      <div class="stat-val bear" id="s-neg">—</div>
    </div>
    <div class="stat-card info-card">
      <div class="stat-label">TOP POSITIVE</div>
      <div class="stat-val gold" id="s-top-pos">—</div>
    </div>
    <div class="stat-card neg-card">
      <div class="stat-label">TOP NEGATIVE</div>
      <div class="stat-val gold" id="s-top-neg">—</div>
    </div>
  </div>

  <div class="result-meta" id="result-meta" style="display:none;">
    <span class="result-count" id="result-count"></span>
    <span class="updated-text" id="updated-text"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrapper">
    <table class="scanner-table">
      <thead id="table-head" style="display:none;">
        <tr>
          <th>COIN</th>
          <th>EXCHANGE</th>
          <th>TYPE</th>
          <th class="sorted" id="th-rate" onclick="sortBy('rate')">FUNDING RATE <span class="sort-icon active" id="icon-rate">▼</span></th>
          <th id="th-abs" onclick="sortBy('abs')">ABS VALUE <span class="sort-icon" id="icon-abs">↕</span></th>
          <th>SIGNAL</th>
          <th>MARK PRICE</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7">
          <div class="idle-state">
            <div class="idle-icon">◎</div>
            <div class="idle-title">AWAITING EXCHANGE SELECTION</div>
            <div class="idle-sub">Select an exchange above, then press SCAN</div>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <!-- MOBILE CARD VIEW (shown on mobile, hidden on desktop) -->
  <div class="mobile-cards" id="mobile-cards">
    <div class="m-empty">
      <div class="m-empty-icon">◎</div>
      <div class="m-empty-title">AWAITING EXCHANGE SELECTION</div>
      <div class="m-empty-sub">Select an exchange above, then press SCAN</div>
    </div>
  </div>

</div><!-- /pane-funding -->

<!-- ══════════════ PULSE TAB ══════════════ -->
<div class="tab-pane" id="pane-pulse">

  <!-- Exchange selector (Bybit only for full data) -->
  <div class="pulse-ex-panel">
    <span class="panel-label">EXCHANGE:</span>
    <div class="ex-selector">
      <button class="ex-select-btn bybit-btn selected" id="pulse-ex-bybit" onclick="pulseSelectEx('bybit')">
        <span class="ex-dot"></span>
        BYBIT LINEAR
      </button>
      <button class="ex-select-btn binance-btn" id="pulse-ex-binance" onclick="pulseSelectEx('binance')">
        <span class="ex-dot"></span>
        BINANCE FUTURES
      </button>
    </div>
    <div class="panel-sep"></div>
    <button class="scan-btn enabled bybit-scan" id="pulse-scan-btn" onclick="runPulseScan()">
      <span class="scan-icon" id="pulse-scan-icon">⟳</span>
      <span id="pulse-scan-label">SCAN PULSE</span>
    </button>
  </div>

  <!-- Info note -->
  <div class="pulse-note" id="pulse-note">
    <span>PULSE ENGINE</span> — Multi-signal leverage health analysis.
    Bybit: funding + OI + volume + price in 2 calls.
    Binance: funding + volume + price (OI requires per-symbol calls — top 30 by funding only).
    Threshold: assets with |funding| &gt; 0.01% are analysed.
  </div>

  <!-- Progress bar -->
  <div class="pulse-progress" id="pulse-progress">
    <div class="pulse-progress-fill" id="pulse-prog-fill"></div>
  </div>

  <!-- Summary stat cards -->
  <div class="pulse-summary" id="pulse-summary">
    <div class="pulse-sum-card c-all">
      <div class="stat-label">TOTAL ANALYSED</div>
      <div class="stat-val accent" id="ps-total">—</div>
    </div>
    <div class="pulse-sum-card c-bull">
      <div class="stat-label">HEALTHY TREND</div>
      <div class="stat-val bull" id="ps-bull">—</div>
    </div>
    <div class="pulse-sum-card c-bear">
      <div class="stat-label">SQUEEZE RISK</div>
      <div class="stat-val bear" id="ps-bear">—</div>
    </div>
    <div class="pulse-sum-card c-warn">
      <div class="stat-label">DISTRIBUTION</div>
      <div class="stat-val" style="color:var(--orange)" id="ps-warn">—</div>
    </div>
    <div class="pulse-sum-card c-neut">
      <div class="stat-label">NEUTRAL / MIXED</div>
      <div class="stat-val" style="color:var(--text-secondary)" id="ps-neut">—</div>
    </div>
  </div>

<script>
'use strict';

let allData       = [];
let currentFilter = 'all';
let sortKey       = 'rate';
let sortDir       = -1;
let selectedEx    = null;   // 'binance' | 'bybit'
let hasScanned    = false;

/* ── CLOCK ── */
function startClock() {
  const el = document.getElementById('header-time');
  const tick = () => { el.textContent = new Date().toLocaleTimeString('en-US',{hour12:false}); };
  tick(); setInterval(tick, 1000);
}

/* ── STATUS ── */
function setStatus(type, text) {
  document.getElementById('status-dot').className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}
function nowStr() { return new Date().toLocaleTimeString('en-US',{hour12:false}); }

/* ── EXCHANGE SELECTION ── */
function selectExchange(ex) {
  // If switching exchange mid-session → clear results
  if (hasScanned && ex !== selectedEx) {
    resetResults();
  }

  selectedEx = ex;

  document.getElementById('ex-binance').classList.toggle('selected', ex === 'binance');
  document.getElementById('ex-bybit').classList.toggle('selected',   ex === 'bybit');

  // Enable and style scan button
  const btn = document.getElementById('scan-btn');
  btn.className = 'scan-btn enabled ' + (ex === 'binance' ? 'binance-scan' : 'bybit-scan');

  setStatus('ready', ex === 'binance' ? 'BINANCE — READY TO SCAN' : 'BYBIT — READY TO SCAN');
}

/* ── RESET RESULTS (called on exchange switch) ── */
function resetResults() {
  allData    = [];
  hasScanned = false;

  document.getElementById('active-strip').style.display  = 'none';
  document.getElementById('controls-bar').style.display  = 'none';
  document.getElementById('stats-row').style.display     = 'none';
  document.getElementById('result-meta').style.display   = 'none';
  document.getElementById('table-head').style.display    = 'none';
  document.getElementById('search-input').value          = '';
  currentFilter = 'all';
  ['all','pos','neg'].forEach(id => {
    const b = document.getElementById('f-' + id);
    b.className = 'filter-btn' + (id === 'all' ? ' active-all' : '');
  });

  const idleHtml = `<div class="idle-state">
    <div class="idle-icon">◎</div>
    <div class="idle-title">EXCHANGE SWITCHED</div>
    <div class="idle-sub">Press SCAN to load data</div>
  </div>`;

  document.getElementById('table-body').innerHTML = `<tr><td colspan="7">${idleHtml}</td></tr>`;

  const mc = document.getElementById('mobile-cards');
  if (mc) mc.innerHTML = `<div class="m-empty">
    <div class="m-empty-icon">◎</div>
    <div class="m-empty-title">EXCHANGE SWITCHED</div>
    <div class="m-empty-sub">Press SCAN to load data</div>
  </div>`;
}

/* ── FETCH HELPERS ── */
async function safeFetch(url, direct=false) {
  if (direct) {
    try {
      const r = await fetch(url, {cache:'no-store'});
      if (!r.ok) throw 0;
      return await r.json();
    } catch(e) { return null; }
  }
  const PROXIES = [
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest=',
    'https://thingproxy.freeboard.io/fetch/',
  ];
  for (const p of PROXIES) {
    try {
      const r = await fetch(p + encodeURIComponent(url), {cache:'no-store'});
      if (!r.ok) continue;
      const txt = await r.text();
      try {
        const j = JSON.parse(txt);
        return j.contents && typeof j.contents === 'string' ? JSON.parse(j.contents) : j;
      } catch(e2) { continue; }
    } catch(e) { continue; }
  }
  return null;
}

async function getBinance() {
  const data = await safeFetch('https://fapi.binance.com/fapi/v1/premiumIndex');
  if (!data || !Array.isArray(data)) return [];
  return data
    .filter(t => (t.symbol.endsWith('USDT') || t.symbol.endsWith('BUSD')) && t.lastFundingRate !== undefined)
    .map(t => ({
      symbol:   t.symbol.replace('USDT','').replace('BUSD',''),
      fullSym:  t.symbol,
      exchange: 'Binance',
      type:     'Futures',
      rate:     parseFloat(t.lastFundingRate) * 100,
      price:    parseFloat(t.markPrice) || parseFloat(t.indexPrice) || null,
    }));
}

async function getBybit() {
  const data = await safeFetch('https://api.bybit.com/v5/market/tickers?category=linear', true);
  if (!data || !data.result || !data.result.list) return [];
  return data.result.list
    .filter(t => t.fundingRate !== undefined && t.fundingRate !== '' && t.symbol.endsWith('USDT'))
    .map(t => ({
      symbol:   t.symbol.replace('USDT',''),
      fullSym:  t.symbol,
      exchange: 'Bybit',
      type:     'Futures',
      rate:     parseFloat(t.fundingRate) * 100,
      price:    parseFloat(t.lastPrice) || null,
    }));
}

/* ── MAIN SCAN ── */
async function runScan() {
  if (!selectedEx) return;

  const threshold = parseFloat(document.getElementById('threshold').value) || 0.03;
  const btn       = document.getElementById('scan-btn');
  const icon      = document.getElementById('scan-icon');

  btn.classList.add('loading');
  setStatus('loading', 'FETCHING ' + selectedEx.toUpperCase() + '...');

  const loaderCls = selectedEx === 'binance' ? 'loader-ring orange' : 'loader-ring';
  document.getElementById('table-head').style.display = 'none';
  document.getElementById('table-body').innerHTML =
    `<tr class="state-row"><td colspan="7"><span class="${loaderCls}"></span>FETCHING ${selectedEx.toUpperCase()} DATA...</td></tr>`;

  // Mobile loading state
  const mc = document.getElementById('mobile-cards');
  if (mc) mc.innerHTML = `<div class="m-empty">
    <div class="m-empty-icon" style="opacity:0.4;animation:spin 1s linear infinite;display:inline-block;">⟳</div>
    <div class="m-empty-title">FETCHING ${selectedEx.toUpperCase()}...</div>
  </div>`;

  // Fetch only the selected exchange
  let rawData = selectedEx === 'binance' ? await getBinance() : await getBybit();
  const fetchOk = rawData.length > 0;

  // Dedupe + threshold filter
  const seen = new Set();
  allData = rawData.filter(c => {
    const k = c.fullSym;
    if (seen.has(k)) return false;
    seen.add(k);
    if (isNaN(c.rate)) return false;
    return c.rate < 0 || c.rate >= threshold;
  });

  hasScanned = true;

  // Active strip
  const strip = document.getElementById('active-strip');
  strip.className = 'active-ex-strip ' + selectedEx;
  strip.style.display = 'flex';

  const stripName = document.getElementById('strip-ex-name');
  stripName.className = 'strip-ex-label ' + selectedEx;
  stripName.textContent = selectedEx === 'binance' ? 'BINANCE FUTURES' : 'BYBIT LINEAR';

  document.getElementById('strip-count').textContent = fetchOk ? rawData.length + ' SYMBOLS' : 'FETCH FAILED';
  document.getElementById('strip-count').className   = 'strip-val ' + (fetchOk ? 'ok' : 'fail');
  document.getElementById('strip-thr').textContent   = threshold.toFixed(3) + '%';
  document.getElementById('strip-upd').textContent   = nowStr();

  // Reveal controls + stats + meta
  document.getElementById('controls-bar').style.display = 'flex';
  document.getElementById('stats-row').style.display    = 'grid';
  document.getElementById('result-meta').style.display  = 'flex';
  document.getElementById('table-head').style.display   = '';

  // Footer
  document.getElementById('footer-ex').textContent =
    selectedEx === 'binance' ? 'BINANCE FUTURES PERPETUALS' : 'BYBIT LINEAR PERPETUALS';

  updateStats();
  renderTable();

  document.getElementById('updated-text').textContent = 'LAST SCAN: ' + nowStr();
  btn.classList.remove('loading');

  if (fetchOk) {
    setStatus('ok', selectedEx.toUpperCase() + ' — ' + allData.length + ' SIGNALS');
  } else {
    setStatus('error', selectedEx.toUpperCase() + ' — FETCH FAILED');
  }
}

/* ── STATS ── */
function updateStats() {
  const pos = allData.filter(c => c.rate > 0);
  const neg = allData.filter(c => c.rate < 0);
  document.getElementById('s-total').textContent = allData.length;
  document.getElementById('s-pos').textContent   = pos.length;
  document.getElementById('s-neg').textContent   = neg.length;
  const tp = [...pos].sort((a,b) => b.rate - a.rate)[0];
  const tn = [...neg].sort((a,b) => a.rate - b.rate)[0];
  document.getElementById('s-top-pos').textContent = tp ? tp.symbol + ' +' + tp.rate.toFixed(4) + '%' : '—';
  document.getElementById('s-top-neg').textContent = tn ? tn.symbol + ' '  + tn.rate.toFixed(4) + '%' : '—';
}

/* ── FILTER ── */
function setFilter(f) {
  currentFilter = f;
  ['all','pos','neg'].forEach(id => {
    const btn = document.getElementById('f-' + id);
    btn.className = 'filter-btn' + (id === f ? ' active-' + id : '');
  });
  renderTable();
}

/* ── SORT ── */
function sortBy(key) {
  sortDir = (sortKey === key) ? sortDir * -1 : -1;
  sortKey = key;
  ['rate','abs'].forEach(k => {
    document.getElementById('th-' + k).classList.remove('sorted');
    const ico = document.getElementById('icon-' + k);
    ico.textContent = '↕'; ico.classList.remove('active');
  });
  document.getElementById('th-' + key).classList.add('sorted');
  const ico = document.getElementById('icon-' + key);
  ico.textContent = sortDir === -1 ? '▼' : '▲';
  ico.classList.add('active');
  renderTable();
}

/* ── SIGNAL ── */
function getSignal(rate, threshold) {
  if (rate < 0)              return { label:'SHORTS PAYING', cls:'sig-neg' };
  if (rate >= threshold * 3) return { label:'EXTREME LONGS', cls:'sig-extreme' };
  return                            { label:'LONGS PAYING',  cls:'sig-pos' };
}

/* ── RENDER TABLE ── */
function renderTable() {
  if (!hasScanned) return;

  const search    = document.getElementById('search-input').value.trim().toLowerCase();
  const threshold = parseFloat(document.getElementById('threshold').value) || 0.03;

  let data = allData.filter(c => {
    if (currentFilter === 'pos' && c.rate <= 0) return false;
    if (currentFilter === 'neg' && c.rate >= 0) return false;
    if (search && !c.symbol.toLowerCase().includes(search) && !c.fullSym.toLowerCase().includes(search)) return false;
    return true;
  });

  data.sort((a, b) => {
    const av = sortKey === 'abs' ? Math.abs(a.rate) : a.rate;
    const bv = sortKey === 'abs' ? Math.abs(b.rate) : b.rate;
    return sortDir * (bv - av);
  });

  const pos = data.filter(c => c.rate > 0).length;
  const neg = data.filter(c => c.rate < 0).length;
  document.getElementById('result-count').textContent =
    data.length + ' COINS · ' + pos + ' POSITIVE · ' + neg + ' NEGATIVE';

  const maxAbs = Math.max(...data.map(c => Math.abs(c.rate)), 0.001);
  const exCls  = selectedEx === 'binance' ? 'ex-binance' : 'ex-bybit';
  const exLbl  = selectedEx === 'binance' ? 'BINANCE' : 'BYBIT';

  // ── DESKTOP TABLE ──
  if (!data.length) {
    document.getElementById('table-body').innerHTML =
      '<tr class="state-row"><td colspan="7">NO COINS MATCH CURRENT FILTERS</td></tr>';
  } else {
    const rows = data.map((c, i) => {
      const isPos    = c.rate > 0;
      const rateCls  = isPos ? 'pos' : 'neg';
      const barCls   = isPos ? 'bar-pos' : 'bar-neg';
      const barPct   = Math.min((Math.abs(c.rate) / maxAbs) * 100, 100).toFixed(1);
      const sign     = isPos ? '+' : '';
      const initials = c.symbol.slice(0,3).toUpperCase();
      const price    = c.price
        ? (c.price >= 1
            ? c.price.toLocaleString('en-US',{maximumFractionDigits:2})
            : c.price.toFixed(6))
        : '—';
      const sig = getSignal(c.rate, threshold);
      return `<tr style="animation-delay:${i * 0.012}s">
        <td>
          <div class="coin-cell">
            <div class="coin-icon">${initials}</div>
            <div>
              <div class="coin-sym">${c.symbol}</div>
              <div class="coin-full">${c.fullSym}</div>
            </div>
          </div>
        </td>
        <td><span class="ex-badge ${exCls}">${exLbl}</span></td>
        <td><span class="type-badge type-futures">FUTURES</span></td>
        <td>
          <div class="rate-cell">
            <span class="rate-val ${rateCls}">${sign}${c.rate.toFixed(4)}%</span>
            <div class="rate-bar-bg"><div class="rate-bar ${barCls}" style="width:${barPct}%"></div></div>
          </div>
        </td>
        <td><span class="rate-val muted">${Math.abs(c.rate).toFixed(4)}%</span></td>
        <td><span class="signal-badge ${sig.cls}">${sig.label}</span></td>
        <td><span class="price-val">${price}</span></td>
      </tr>`;
    });
    document.getElementById('table-body').innerHTML = rows.join('');
  }

  // ── MOBILE CARDS ──
  renderMobileCards(data, maxAbs, threshold);
}

function renderMobileCards(data, maxAbs, threshold) {
  const container = document.getElementById('mobile-cards');
  if (!container) return;

  if (!data.length) {
    container.innerHTML = `<div class="m-empty">
      <div class="m-empty-icon">◎</div>
      <div class="m-empty-title">NO COINS MATCH FILTERS</div>
      <div class="m-empty-sub">Try adjusting threshold or filter</div>
    </div>`;
    return;
  }

  const cards = data.map((c, i) => {
    const isPos    = c.rate > 0;
    const rateCls  = isPos ? 'pos' : 'neg';
    const barCls   = isPos ? 'bar-pos' : 'bar-neg';
    const cardCls  = isPos ? 'm-pos' : 'm-neg';
    const barPct   = Math.min((Math.abs(c.rate) / maxAbs) * 100, 100).toFixed(1);
    const sign     = isPos ? '+' : '';
    const initials = c.symbol.slice(0,3).toUpperCase();
    const price    = c.price
      ? (c.price >= 1
          ? c.price.toLocaleString('en-US',{maximumFractionDigits:2})
          : c.price.toFixed(6))
      : '—';
    const sig = getSignal(c.rate, threshold);
    return `<div class="m-card ${cardCls}" style="animation-delay:${i * 0.01}s">
      <div class="m-card-top">
        <div class="m-coin-left">
          <div class="m-coin-icon">${initials}</div>
          <div>
            <div class="m-coin-sym">${c.symbol}</div>
            <div class="m-coin-full">${c.fullSym}</div>
          </div>
        </div>
        <div class="m-rate-right">
          <span class="m-rate-val ${rateCls}">${sign}${c.rate.toFixed(4)}%</span>
          <span class="m-abs-val">ABS ${Math.abs(c.rate).toFixed(4)}%</span>
        </div>
      </div>
      <div class="m-card-bottom">
        <div class="m-bar-wrap">
          <div class="m-bar ${barCls}" style="width:${barPct}%"></div>
        </div>
        <div class="m-meta">
          <span class="price-val m-price">$${price}</span>
          <span class="signal-badge m-signal ${sig.cls}">${sig.label}</span>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = cards.join('');
}

    .filter(t => t.symbol.endsWith('USDT') && t.lastFundingRate !== undefined)

async function fetchBinanceTicker() {

/* ── PULSE SCORING ENGINE ── */
/*
  Scoring:  Each signal contributes to a directional score.
  Score range: -100 (full bear) to +100 (full bull)
  
  Signals used:
  1. Funding direction & magnitude  (weight: 30)
  2. Price 24h trend                (weight: 20)
  3. OI context                     (weight: 25) — Bybit only
  4. Volume context                 (weight: 15)
  5. Basis (mark vs index)          (weight: 10)

  Outcome mapping:
  score >= 40  AND funding > 0.01   → HEALTHY TREND (Outcome A)
  score <= -30 AND funding < -0.01  → SQUEEZE RISK  (Outcome B)
  score >= 20  AND funding > 0.05   → DISTRIBUTION  (Outcome C)  [extreme funding, moderate score]
  else                              → NEUTRAL / MIXED
*/

function scoreAsset(a) {
  let score = 0;
  const signals = [];

  const absF = Math.abs(a.funding);
  const isPosFunding = a.funding > 0;

  // ── Signal 1: Funding magnitude & direction (±30)
  let fScore = 0;
  if (absF > 0.1)       fScore = isPosFunding ? 30 : -30;
  else if (absF > 0.05) fScore = isPosFunding ? 20 : -20;
  else if (absF > 0.02) fScore = isPosFunding ? 12 : -12;
  else if (absF > 0.01) fScore = isPosFunding ?  6 :  -6;
  score += fScore;
  signals.push({label:'FUNDING', val: fScore >= 0 ? '+'+fScore : fScore, cls: fScore > 0 ? 'pos' : fScore < 0 ? 'neg' : 'neu'});

  // ── Signal 2: Price 24h trend (±20)
  let pScore = 0;
  const p = a.price24hPct;
  if      (p >  5) pScore =  20;
  else if (p >  2) pScore =  12;
  else if (p >  0.5) pScore = 6;
  else if (p < -5) pScore = -20;
  else if (p < -2) pScore = -12;
  else if (p < -0.5) pScore = -6;
  score += pScore;
  signals.push({label:'PRICE 24H', val: (p >= 0 ? '+' : '') + p.toFixed(2)+'%', cls: pScore > 0 ? 'pos' : pScore < 0 ? 'neg' : 'neu'});

  // ── Signal 3: OI context (±25) — only if OI data available
  let oiScore = 0;
  let oiLabel = '—';
  if (a.oi > 0) {
    // OI rising + positive funding = healthy OR overheated depending on magnitude
    // OI falling + negative funding = capitulation / potential bottom
    // We infer OI trend from OI magnitude vs vol ratio as proxy
    // (without historical OI we use vol/OI ratio: high = high turnover = churn)
    const volOiRatio = a.vol24h > 0 && a.oi > 0 ? a.vol24h / a.oi : 0;
    if (isPosFunding) {
      // Positive funding: high vol/OI = strong conviction
      if (volOiRatio > 3)      { oiScore =  20; oiLabel = 'HIGH CONVICTION'; }
      else if (volOiRatio > 1) { oiScore =  10; oiLabel = 'MODERATE'; }
      else if (volOiRatio > 0.3){ oiScore =  5; oiLabel = 'LOW TURNOVER'; }
      else                     { oiScore = -10; oiLabel = 'STAGNANT'; }
    } else {
      // Negative funding: high vol/OI = churn (shorts losing conviction)
      if (volOiRatio > 3)      { oiScore =  15; oiLabel = 'SHORT CHURN'; }   // potential squeeze setup
      else if (volOiRatio > 1) { oiScore =   5; oiLabel = 'MODERATE'; }
      else                     { oiScore = -15; oiLabel = 'HEAVY SHORT OI'; }
    }
  } else {
    oiLabel = 'N/A';
  }
  score += oiScore;
  signals.push({label:'OI CONTEXT', val: oiLabel, cls: oiScore > 5 ? 'pos' : oiScore < -5 ? 'neg' : 'neu'});

  // ── Signal 4: Volume context (±15)
  let vScore = 0;
  let vLabel = '—';
  if (a.vol24h > 0) {
    const vM = a.vol24h / 1e6; // vol in millions USDT
    if (vM > 500)       { vScore = isPosFunding ?  15 : -15; vLabel = vM.toFixed(0)+'M'; }
    else if (vM > 100)  { vScore = isPosFunding ?   8 :  -8; vLabel = vM.toFixed(0)+'M'; }
    else if (vM > 20)   { vScore = isPosFunding ?   4 :  -4; vLabel = vM.toFixed(0)+'M'; }
    else                { vScore = 0; vLabel = vM.toFixed(1)+'M'; }
  }
  score += vScore;
  signals.push({label:'VOLUME 24H', val: a.vol24h > 0 ? '$'+fmtVol(a.vol24h) : '—', cls: vScore > 0 ? 'pos' : vScore < 0 ? 'neg' : 'neu'});

  // ── Signal 5: Basis — mark vs index (±10)
  let bScore = 0;
  let bLabel = '—';
  if (a.markPrice > 0 && a.indexPrice > 0) {
    const basis = ((a.markPrice - a.indexPrice) / a.indexPrice) * 100;
    bLabel = (basis >= 0 ? '+' : '') + basis.toFixed(3) + '%';
    if      (basis >  0.1)  bScore = -10;  // large premium = elevated crash risk
    else if (basis >  0.03) bScore =  -4;
    else if (basis < -0.1)  bScore =  10;  // discount = squeeze fuel
    else if (basis < -0.03) bScore =   4;
    else                    bScore =   0;
  }
  score += bScore;
  signals.push({label:'BASIS', val: bLabel, cls: bScore > 0 ? 'pos' : bScore < 0 ? 'neg' : 'neu'});

  // ── Outcome classification
  let outcome, outcomeLabel, outcomeCls, ocCls;
  const isExtremePos = a.funding >  0.05;
  const isExtremeNeg = a.funding < -0.05;

  if (isExtremePos && score >= 15 && score < 40) {
    outcome = 'warn'; outcomeLabel = 'DISTRIBUTION'; ocCls = 'oc-warn';
  } else if (score >= 35) {
    outcome = 'bull'; outcomeLabel = 'HEALTHY TREND'; ocCls = 'oc-bull';
  } else if (score <= -25 || (isExtremeNeg && score <= -10)) {
    outcome = 'bear'; outcomeLabel = 'SQUEEZE RISK';  ocCls = 'oc-bear';
  } else if (isExtremePos && score < 0) {
    outcome = 'warn'; outcomeLabel = 'OVERHEATED';    ocCls = 'oc-warn';
  } else {
    outcome = 'neut'; outcomeLabel = 'NEUTRAL/MIXED'; ocCls = 'oc-neut';
  }

  // Normalise score to 0-100 for display bar
  const barPct = Math.min(Math.abs(score) / 80 * 100, 100);
  const fillCls = outcome === 'bull' ? 'fill-bull' : outcome === 'bear' ? 'fill-bear' : outcome === 'warn' ? 'fill-warn' : 'fill-neut';
  const scoreColor = outcome === 'bull' ? 'pos' : outcome === 'bear' ? 'neg' : outcome === 'warn' ? 'warn' : 'neu';

  // Build thesis string
  const thesis = buildThesis(a, outcome, score, oiLabel);

  return {
    ...a,
    score, barPct, fillCls, scoreColor,
    outcome, outcomeLabel, ocCls,
    signals, thesis,
    basisLabel: bLabel,
  };
}

function buildThesis(a, outcome, score, oiLabel) {
  const fStr = (a.funding >= 0 ? '+' : '') + a.funding.toFixed(4) + '%';
  const pStr = (a.price24hPct >= 0 ? '+' : '') + a.price24hPct.toFixed(2) + '%';

  if (outcome === 'bull') {
    return `<strong>HEALTHY EXPANSION</strong> — Funding ${fStr}, price ${pStr} 24h. ${oiLabel !== 'N/A' ? 'OI: '+oiLabel+'.' : ''} Leverage aligned with price trend. Continued upside favoured.`;
  }
  if (outcome === 'bear') {
    return `<strong>SQUEEZE RISK</strong> — Funding ${fStr} (shorts paying longs). ${oiLabel === 'SHORT CHURN' ? 'Short conviction fading — churn detected.' : 'Heavy short OI building.'} Price ${pStr} 24h. Watch for violent reversal upward.`;
  }
  if (outcome === 'warn') {
    if (a.funding > 0.05) return `<strong>DISTRIBUTION / OVERHEATED</strong> — Funding extreme at ${fStr}. Longs paying heavily. ${oiLabel !== 'N/A' ? 'OI '+oiLabel+'.' : ''} Risk of long squeeze or sharp deleveraging.`;
    return `<strong>CAUTION</strong> — Mixed signals. Funding ${fStr}, price ${pStr}. No clear conviction.`;
  }
  return `<strong>NEUTRAL</strong> — Funding ${fStr}, price ${pStr}. Signals not aligned. Wait for clearer setup.`;
}

function fmtVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}

function fmtNextFunding(ts) {
  if (!ts) return '—';
  const diff = ts - Date.now();
  if (diff < 0) return 'NOW';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h + 'h ' + m + 'm';
}

/* ── MAIN PULSE SCAN ── */
async function runPulseScan() {
  const btn  = document.getElementById('pulse-scan-btn');
  const icon = document.getElementById('pulse-scan-icon');
  btn.classList.add('loading');
  icon.style.animation = 'spin 0.7s linear infinite';
  setStatus('loading', 'PULSE — FETCHING DATA...');

  document.getElementById('pulse-progress').style.display = 'block';
  document.getElementById('pulse-prog-fill').style.width  = '0%';
  document.getElementById('pulse-output').innerHTML = `<div class="pulse-idle">
    <div class="pulse-idle-icon" style="animation:spin 1.2s linear infinite;display:inline-block;opacity:0.3">⟳</div>
    <div class="pulse-idle-title">ANALYSING MARKET...</div>
    <div class="pulse-idle-sub">Fetching signals from ${pulseEx.toUpperCase()}</div>
  </div>`;

  try {
    let raw = [];
    if (pulseEx === 'bybit') {
      document.getElementById('pulse-prog-fill').style.width = '50%';
      raw = await fetchBybitTickers();
      document.getElementById('pulse-prog-fill').style.width = '90%';
    } else {
      // Binance: two parallel bulk calls
      const [funding, tickerMap] = await Promise.all([fetchBinanceFunding(), fetchBinanceTicker()]);
      document.getElementById('pulse-prog-fill').style.width = '80%';
      raw = funding.map(f => ({
        ...f,
        vol24h:      tickerMap[f.fullSym]?.vol24h      || 0,
        price24hPct: tickerMap[f.fullSym]?.price24hPct || 0,
      }));
      document.getElementById('pulse-prog-fill').style.width = '90%';
    }

    // Filter: only assets with meaningful funding (|rate| > 0.01%)
    const filtered = raw.filter(a => Math.abs(a.funding) > 0.01);

    // Score every asset
    pulseData = filtered.map(scoreAsset).sort((a,b) => Math.abs(b.score) - Math.abs(a.score));
    pulseHasScanned = true;

    document.getElementById('pulse-prog-fill').style.width = '100%';

    // Show UI elements
    document.getElementById('pulse-summary').style.display    = 'grid';
    document.getElementById('pulse-filter-bar').style.display = 'flex';
    document.getElementById('pulse-result-meta').style.display = 'flex';

    updatePulseSummary();
    renderPulse();

    setStatus('ok', 'PULSE — ' + pulseData.length + ' ANALYSED');
    document.getElementById('pulse-updated').textContent = 'LAST SCAN: ' + nowStr();

  } catch(e) {
    document.getElementById('pulse-output').innerHTML = `<div class="pulse-idle">
      <div class="pulse-idle-title" style="color:var(--bear)">FETCH ERROR</div>
      <div class="pulse-idle-sub">${e.message}</div>
    </div>`;
    setStatus('error', 'PULSE — FETCH FAILED');
  }

  setTimeout(() => { document.getElementById('pulse-progress').style.display = 'none'; }, 800);
  btn.classList.remove('loading');
  icon.style.animation = '';
}

function updatePulseSummary() {
  const bull = pulseData.filter(a => a.outcome === 'bull').length;
  const bear = pulseData.filter(a => a.outcome === 'bear').length;
  const warn = pulseData.filter(a => a.outcome === 'warn').length;
  const neut = pulseData.filter(a => a.outcome === 'neut').length;
  document.getElementById('ps-total').textContent = pulseData.length;
  document.getElementById('ps-bull').textContent  = bull;
  document.getElementById('ps-bear').textContent  = bear;
  document.getElementById('ps-warn').textContent  = warn;
  document.getElementById('ps-neut').textContent  = neut;
}

function setPulseFilter(f) {
  pulseFilter = f;
  const map = {all:'of-all', bull:'of-bull', bear:'of-bear', warn:'of-warn', neut:''};
  ['all','bull','bear','warn','neut'].forEach(id => {
    const b = document.getElementById('pf-'+id);
    b.className = 'outcome-btn' + (id === f ? ' '+map[id] : '');
  });
  renderPulse();
}

function renderPulse() {
  if (!pulseHasScanned) return;
  const search = (document.getElementById('pulse-search')?.value || '').trim().toLowerCase();

  let data = pulseData.filter(a => {
    if (pulseFilter !== 'all' && a.outcome !== pulseFilter) return false;
    if (search && !a.symbol.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('pulse-result-count').textContent =
    data.length + ' ASSETS · ' +
    data.filter(a=>a.outcome==='bull').length + ' HEALTHY · ' +
    data.filter(a=>a.outcome==='bear').length + ' SQUEEZE · ' +
    data.filter(a=>a.outcome==='warn').length + ' DISTRIB';

  if (!data.length) {
    document.getElementById('pulse-output').innerHTML = `<div class="pulse-idle">
      <div class="pulse-idle-icon">◎</div>
      <div class="pulse-idle-title">NO ASSETS MATCH</div>
      <div class="pulse-idle-sub">Try a different filter</div>
    </div>`;
    return;
  }

  const cards = data.map((a, i) => {
    const sign = a.funding >= 0 ? '+' : '';
    const p24  = (a.price24hPct >= 0 ? '+' : '') + a.price24hPct.toFixed(2) + '%';
    const initials = a.symbol.slice(0,3).toUpperCase();
    const price = a.price >= 1
      ? a.price.toLocaleString('en-US',{maximumFractionDigits:2})
      : a.price.toFixed(6);
    const fundCls = a.funding > 0 ? 'pos' : 'neg';
    const p24Cls  = a.price24hPct > 0 ? 'pos' : a.price24hPct < 0 ? 'neg' : 'neu';
    const scoreTxt = (a.score >= 0 ? '+' : '') + a.score;

    const oiDisp = a.oi > 0 ? '$' + fmtVol(a.oi) : '—';
    const volDisp = a.vol24h > 0 ? '$' + fmtVol(a.vol24h) : '—';

    return `<div class="pulse-card outcome-${a.outcome}" style="animation-delay:${i*0.015}s">
      <div class="pc-head">
        <div class="pc-coin-wrap">
          <div class="pc-icon">${initials}</div>
          <div>
            <div class="pc-sym">${a.symbol}</div>
            <div class="pc-full">${a.fullSym}</div>
          </div>
        </div>
        <span class="pc-outcome ${a.ocCls}">${a.outcomeLabel}</span>
      </div>
      <div class="pc-metrics">
        <div class="pc-metric">
          <div class="pc-metric-label">FUNDING RATE</div>
          <div class="pc-metric-val ${fundCls}">${sign}${a.funding.toFixed(4)}%</div>
          <div class="pc-metric-sub">Next: ${fmtNextFunding(a.nextFunding)}</div>
        </div>
        <div class="pc-metric">
          <div class="pc-metric-label">PRICE 24H</div>
          <div class="pc-metric-val ${p24Cls}">${p24}</div>
          <div class="pc-metric-sub">$${price}</div>
        </div>
        <div class="pc-metric">
          <div class="pc-metric-label">OPEN INTEREST</div>
          <div class="pc-metric-val ${a.oi > 0 ? 'gold' : 'neu'}">${oiDisp}</div>
          <div class="pc-metric-sub">${a.signals[2]?.val || '—'}</div>
        </div>
        <div class="pc-metric">
          <div class="pc-metric-label">VOLUME 24H</div>
          <div class="pc-metric-val neu">${volDisp}</div>
          <div class="pc-metric-sub">BASIS: ${a.basisLabel}</div>
        </div>
      </div>
      <div class="pc-score-row">
        <span class="pc-score-label">CONFLUENCE SCORE</span>
        <div class="pc-score-bar-bg"><div class="pc-score-fill ${a.fillCls}" style="width:${a.barPct}%"></div></div>
        <span class="pc-score-num ${a.scoreColor}">${scoreTxt}</span>
      </div>
      <div class="pc-thesis">${a.thesis}</div>
    </div>`;
  });

  document.getElementById('pulse-output').innerHTML = `<div class="pulse-grid">${cards.join('')}</div>`;
}

/* ── INIT ── */
startClock();
// Default pulse exchange = bybit (pre-selected)
pulseSelectEx('bybit');
</script>
